<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#4CAF50;
            color:white;
            border:none;
        }

    </style>
</head>

<body>

<div class="box">

    <h2>Register</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username">

        <input type="password"
               name="password"
               placeholder="Password">

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/users/login/">
        Already have account?
    </a>

</div>

</body>
</html>
