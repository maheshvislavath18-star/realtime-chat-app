<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PyChat - {{ room.name }}</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial;
    background:#0b141a;
    height:100vh;
    overflow:hidden;
}

.chat-app{display:flex;height:100vh;}

.sidebar{
    width:320px;
    background:#111b21;
    border-right:1px solid #2a3942;
    color:white;
    padding:10px;
}

.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-header{
    height:75px;
    background:#202c33;
    display:flex;
    align-items:center;
    padding:15px;
    color:white;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.message{
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    max-width:65%;
}

.my-message{background:#005c4b;color:white;margin-left:auto;}
.other-message{background:#202c33;color:white;}

.message img{
    max-width:220px;
    margin-top:6px;
    border-radius:10px;
}

.message-footer{
    display:flex;
    justify-content:flex-end;
    font-size:11px;
    margin-top:5px;
    gap:5px;
    color:#cbd5e1;
}

.tick{font-size:12px;}
.seen{color:#53bdeb;}

.input-area{
    background:#202c33;
    padding:12px;
    display:flex;
    gap:10px;
}

#message-input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a3942;
    color:white;
}

#image-input{color:white;}

#send-button{
    padding:10px 15px;
    background:#00a884;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

#typing-indicator{
    font-size:13px;
    color:#aaa;
    padding:5px 10px;
}
</style>
</head>

<body>

<div class="chat-app">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Online Users</h3>
    <div id="online-users"></div>

    <h4 style="margin-top:20px;">Typing</h4>
    <div id="typing-indicator"></div>
</div>

<!-- CHAT -->
<div class="chat-container">

    <div class="chat-header">
        <h3>{{ room.name }}</h3>
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type message...">
        <input type="file" id="image-input" accept="image/*">
        <button id="send-button">Send</button>
    </div>

</div>
</div>

<script>

const roomName = "{{ room.name }}";
const currentUser = "{{ request.user.username }}";

const socket = new WebSocket(
    (window.location.protocol === "https:" ? "wss" : "ws")
    + "://" + window.location.host + "/ws/chat/" + roomName + "/"
);

let onlineUsers = [];

/* ================= ONLINE USERS ================= */
function renderOnlineUsers(){
    document.getElementById("online-users").innerHTML =
        onlineUsers.map(u => `<div>🟢 ${u}</div>`).join("");
}

/* ================= RECEIVE ================= */
socket.onmessage = function(e){

    const data = JSON.parse(e.data);

    if(data.type === "history"){
        data.messages.forEach(m => {
            appendMessage(m.username, m.message, m.image, m.id, m.is_seen);
        });
        return;
    }

    if(data.type === "chat"){
        appendMessage(data.username, data.message, data.image, data.message_id, false);

        if(data.username !== currentUser){
            socket.send(JSON.stringify({
                type:"seen",
                message_id:data.message_id
            }));
        }
        return;
    }

    if(data.type === "seen"){
        const tick = document.getElementById("tick-" + data.message_id);
        if(tick){
            tick.innerText = "✔✔";
            tick.classList.add("seen");
        }
        return;
    }

    if(data.type === "online_users"){
        onlineUsers = data.users;
        renderOnlineUsers();
        return;
    }

    if(data.type === "typing"){
        if(data.username !== currentUser){
            const box = document.getElementById("typing-indicator");
            box.innerText = `${data.username} is typing...`;

            setTimeout(() => {
                box.innerText = "";
            }, 1200);
        }
    }
};

/* ================= MESSAGE UI ================= */
function appendMessage(username, message, image, messageId, isSeen=false){

    const chatBox = document.getElementById("chat-box");
    const isMe = username === currentUser;

    const div = document.createElement("div");
    div.className = "message " + (isMe ? "my-message" : "other-message");

    let imgHTML = image ? `<img src="${image}">` : "";

    let tickHTML = "";
    if(isMe){
        tickHTML = `
            <span id="tick-${messageId}" class="tick ${isSeen ? 'seen' : ''}">
                ${isSeen ? "✔✔" : "✔"}
            </span>
        `;
    }

    div.innerHTML = `
        <b>${username}</b><br>
        ${message || ""}
        ${imgHTML}
        <div class="message-footer">
            <span>${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            ${tickHTML}
        </div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* ================= SEND MESSAGE ================= */
function sendMessage(){

    const input = document.getElementById("message-input");
    const file = document.getElementById("image-input");

    const message = input.value.trim();

    if(!message && file.files.length === 0) return;

    if(file.files.length > 0){

        const formData = new FormData();
        formData.append("message", message);
        formData.append("image", file.files[0]);

        fetch(window.location.href, {
            method:"POST",
            body:formData,
            headers:{"X-Requested-With":"XMLHttpRequest"}
        }).then(() => {

            socket.send(JSON.stringify({
                type:"chat",
                username:currentUser,
                message:message,
                image:"/media/" + file.files[0].name
            }));

            file.value = "";
            input.value = "";
        });

        return;
    }

    socket.send(JSON.stringify({
        type:"chat",
        username:currentUser,
        message:message
    }));

    input.value = "";
}

/* ================= TYPING ================= */
let typingTimer;

document.getElementById("message-input").addEventListener("input", () => {

    socket.send(JSON.stringify({
        type:"typing",
        username:currentUser
    }));

    clearTimeout(typingTimer);

    typingTimer = setTimeout(() => {
        document.getElementById("typing-indicator").innerText = "";
    }, 1200);
});

/* EVENTS */
document.getElementById("send-button").onclick = sendMessage;

document.getElementById("message-input").addEventListener("keypress", e=>{
    if(e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
